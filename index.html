<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Debt Payoff Dashboard — Steve Gordon</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💸</text></svg>">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <script src="https://unpkg.com/recharts@2.10.3/umd/Recharts.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #09090f;
      --surface: #0e0e18;
      --card: #111119;
      --card-h: #16162280;
      --border: #1d1d2e;
      --border-h: #2a2a44;
      --text: #dde1f0;

      --faint: #35395a;
      --accent: #6366f1;

    html { font-size: 16px; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'SF Pro Display', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);

    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border-h); border-radius: 3px; }

      outline: none;

      -webkit-appearance: none;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      box-shadow: 0 0 0 4px rgba(99,102,241,0.25);
      transition: box-shadow 0.2s;
    }
    input[type=range]::-webkit-slider-thumb:hover {
      box-shadow: 0 0 0 7px rgba(99,102,241,0.3);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes dangerGlow {
      0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
      50%      { box-shadow: 0 0 0 5px rgba(239,68,68,0.18); }
    }

    .fu  { animation: fadeUp 0.5s ease-out both; }
    .d1  { animation-delay: 0.05s; }
    .d2  { animation-delay: 0.10s; }
    .d3  { animation-delay: 0.15s; }
    .d4  { animation-delay: 0.20s; }
    .d5  { animation-delay: 0.25s; }
    .d6  { animation-delay: 0.30s; }
    .d7  { animation-delay: 0.35s; }
    .d8  { animation-delay: 0.40s; }
    .d9  { animation-delay: 0.45s; }
    .danger-glow { animation: dangerGlow 3s ease-in-out infinite; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-10px); }
      40%      { transform: translateX(10px); }
      60%      { transform: translateX(-7px); }
      80%      { transform: translateX(4px); }
    }

    /* ── Mobile ── */
    @media (max-width: 640px) {
      .hide-mobile { display: none !important; }

      /* Tighten outer padding */
      .main-wrap { padding: 0 14px 60px !important; }

      /* Header row wraps naturally, reduce text */
      .header-name { font-size: 22px !important; }
      .header-sub  { font-size: 11px !important; }

      /* Stats: 2-col on phone */
      .stats-grid  { grid-template-columns: repeat(2, 1fr) !important; gap: 8px !important; }
      .stat-val    { font-size: 20px !important; }

      /* Chart: shorter on mobile */
      .chart-wrap  { height: 180px !important; }

      /* Extra payment section: stack */
      .extra-row   { flex-direction: column !important; gap: 12px !important; }

      /* Debt cards: single col */
      .debt-grid   { grid-template-columns: 1fr !important; }

      /* Flow cards: 2 col when possible */
      .flow-grid   { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)) !important; }

      /* What's Next: stack columns */
      .wn-row      { flex-direction: column !important; }

      /* Sort pills wrap nicely on mobile */
      .sort-row    { gap: 6px !important; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo } = React;
const {
  ResponsiveContainer, AreaChart, Area,
  XAxis, YAxis, CartesianGrid, Tooltip, ReferenceLine,
} = Recharts;

// CONFIG, DEBTS, START_DATE, FLOW_DATA, and CORRECT_PIN are loaded from DATA.js

/* ══════════════════════════════════════════════════
   SIMULATION ENGINE — avalanche with cascade
══════════════════════════════════════════════════ */
function simulate(debts, extraPayment = 0, startDate = START_DATE) {
  const st = debts.map(d => ({
    ...d,
    bal: d.balance,
    pmt: d.payment,
    done: false,
    payoffDate: null,
    payoffMonth: null,
    interestPaid: 0,
  }));

  const rows = [];
  let cumInterest = 0;

  for (let m = 0; m < 200; m++) {
    if (!st.some(d => !d.done)) break;

    const date = new Date(startDate.getFullYear(), startDate.getMonth() + m, 1);

    // Apply monthly interest
    st.forEach(d => {
      if (d.done) return;
      const interest = d.bal * (d.apr / 100 / 12);
      d.bal += interest;
      d.interestPaid += interest;
      cumInterest += interest;
    });

    // Highest-priority active debt receives extra payment (full avalanche — includes long-term)
    const target = st.filter(d => !d.done).sort((a, b) => a.priority - b.priority)[0];

    // Apply payments
    const newlyDone = [];
    st.forEach(d => {
      if (d.done) return;
      let pmt = d.pmt + (target && d.id === target.id ? extraPayment : 0);
      pmt = Math.min(pmt, d.bal);
      d.bal = Math.max(0, d.bal - pmt);
      if (d.bal < 0.005) {
        d.bal = 0;
        d.done = true;
        d.payoffDate = date;
        d.payoffMonth = m;
        newlyDone.push(d);
      }
    });

    // Cascade freed payments to next highest-priority active debt
    newlyDone.forEach(paid => {
      const next = st.filter(d => !d.done).sort((a, b) => a.priority - b.priority)[0];
      if (next) next.pmt += paid.pmt;
    });

    // Record snapshot
    const row = {
      m, date,
      label: date.toLocaleDateString('en-US', { month: 'short', year: '2-digit' }),
      cumInterest,
    };
    debts.forEach(d => {
      const s = st.find(s => s.id === d.id);
      row[d.id] = Math.round((s.done && s.payoffMonth < m ? 0 : s.bal) * 100) / 100;
    });
    rows.push(row);
  }

  return { rows, results: st, totalInterest: cumInterest };
}

/* ══════════════════════════════════════════════════
   SEQUENCE API (optional live data)
══════════════════════════════════════════════════ */
async function trySequenceAPI() {
  if (!SEQUENCE_API_KEY) return null;
  try {
    const r = await fetch(`${SEQUENCE_API_BASE}/pods`, {
      headers: { Authorization: `Bearer ${SEQUENCE_API_KEY}` },
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    // const data = await r.json();
    // TODO: map Sequence pod response to DEBTS format once API shape is known
    return null;
  } catch (e) {
    console.warn('Sequence API unavailable:', e.message);
    return null;
  }
}

/* ══════════════════════════════════════════════════
   FORMATTERS
══════════════════════════════════════════════════ */
const $f  = n => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(n);
const $fc = n => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: 2 }).format(n);
const fmtDate = d => d ? new Date(d).toLocaleDateString('en-US', { month: 'long', year: 'numeric' }) : '—';

/* ══════════════════════════════════════════════════
   BLUR CONTEXT — privacy toggle
══════════════════════════════════════════════════ */
const BlurCtx = React.createContext(false);
function Num({ children }) {
  const b = React.useContext(BlurCtx);
  return (
    <span style={{
      filter: b ? 'blur(6px)' : 'none',
      userSelect: b ? 'none' : 'auto',
      transition: 'filter 0.25s',
      display: 'inline-block',
      borderRadius: 3,
    }}>
      {children}
    </span>
  );
}

/* ══════════════════════════════════════════════════
   STYLES
══════════════════════════════════════════════════ */
const card = {
  background: '#111119',
  border: '1px solid #1d1d2e',
  borderRadius: 12,
  padding: 20,
};
const label = {
  fontSize: 11, fontWeight: 600,
  letterSpacing: '0.08em', textTransform: 'uppercase',
  color: '#6b718e',
};
const val = { fontSize: 24, fontWeight: 700, color: '#dde1f0', lineHeight: 1.2 };

/* ══════════════════════════════════════════════════
   CHART TOOLTIP
══════════════════════════════════════════════════ */
function ChartTooltip({ active, payload, label }) {
  if (!active || !payload?.length) return null;
  const total = payload.reduce((s, p) => s + (p.value || 0), 0);
  return (
    <div style={{
      background: '#1a1b2c', border: '1px solid #2a2b44',
      borderRadius: 8, padding: '10px 14px', fontSize: 12,
      boxShadow: '0 12px 40px rgba(0,0,0,0.5)',
    }}>
      <div style={{ color: '#8b91b0', fontWeight: 600, marginBottom: 7 }}>{label}</div>
      {[...payload].reverse().filter(p => p.value > 0.5).map(p => (
        <div key={p.dataKey} style={{ display: 'flex', justifyContent: 'space-between', gap: 18, marginBottom: 2 }}>
          <span style={{ color: p.color, display: 'flex', alignItems: 'center', gap: 5 }}>
            <span style={{ width: 7, height: 7, borderRadius: '50%', background: p.color, flexShrink: 0, display: 'inline-block' }} />
            {p.name}
          </span>
          <span style={{ color: '#dde1f0', fontWeight: 600 }}><Num>{$f(p.value)}</Num></span>
        </div>
      ))}
      <div style={{ marginTop: 7, paddingTop: 7, borderTop: '1px solid #2a2b44', display: 'flex', justifyContent: 'space-between' }}>
        <span style={{ color: '#8b91b0' }}>Total</span>
        <span style={{ color: '#fff', fontWeight: 700 }}><Num>{$f(total)}</Num></span>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════
   DEBT CARD
══════════════════════════════════════════════════ */
function DebtCard({ debt, result, index, isFocus }) {
  const isDanger  = !!debt.danger;
  const isPromo   = !!debt.promoEnd && !isDanger;
  const payoff    = result?.payoffDate;
  const interest  = result?.interestPaid ?? 0;
  const minimum   = debt.minimum ?? null;
  const extra     = minimum !== null ? debt.payment - minimum : null;
  const minPct    = minimum !== null ? Math.round((minimum / debt.payment) * 100) : null;

  // Countdown: months from now to payoff
  const monthsLeft = result?.payoffMonth ?? null;

  const [hov, setHov] = useState(false);

  return (
    <div
      className={`fu d${index + 1} ${isDanger ? 'danger-glow' : ''}`}
      onMouseEnter={() => setHov(true)}
      onMouseLeave={() => setHov(false)}
      style={{
        ...card,
        borderColor: isDanger ? 'rgba(239,68,68,0.25)' : hov ? 'var(--border-h)' : 'var(--border)',
        background: isDanger ? 'linear-gradient(145deg, #150a0a, #111119)' : '#111119',
        transform: hov ? 'translateY(-2px)' : 'none',
        boxShadow: hov ? '0 8px 24px rgba(0,0,0,0.4)' : 'none',
        transition: 'all 0.2s ease',
        position: 'relative',
        overflow: 'hidden',
      }}
    >
      {/* Color dot — top-right corner */}
      <div style={{
        position: 'absolute', top: 10, right: 10,
        width: 8, height: 8, borderRadius: '50%',
        background: isDanger ? '#ef4444' : debt.color,
      }} />

      {/* Header row */}
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 14, paddingTop: 2 }}>
        <div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
            <div style={{ fontSize: 13, fontWeight: 600, color: '#dde1f0' }}>{debt.name}</div>
            {isFocus && (
              <div style={{
                fontSize: 9, fontWeight: 800, letterSpacing: '0.1em',
                padding: '2px 6px', borderRadius: 3,
                background: debt.color, color: '#fff',
              }}>FOCUS</div>
            )}
          </div>
          {debt.estimated && (
            <div style={{ fontSize: 10, color: '#6b718e', marginTop: 2 }}>balance estimated</div>
          )}
        </div>
        <div style={{
          fontSize: 11, fontWeight: 700, letterSpacing: '0.05em',
          padding: '3px 8px', borderRadius: 5,
          background: debt.aprEstimated ? 'rgba(251,191,36,0.12)' : isDanger ? 'rgba(239,68,68,0.12)' : isPromo ? 'rgba(99,102,241,0.12)' : '#0d0d16',
          color: debt.aprEstimated ? '#fbbf24' : isDanger ? '#ef4444' : isPromo ? '#818cf8' : '#6b718e',
          whiteSpace: 'nowrap',
          display: 'flex', alignItems: 'center', gap: 3,
        }}>
          {debt.apr === 0 ? '0% PROMO' : `${debt.aprEstimated ? '~' : ''}${debt.apr}% APR`}
          {debt.aprEstimated && <span title="Confirm exact APR on statement" style={{ fontSize: 10 }}>?</span>}
        </div>
      </div>

      {/* Balance — primary colored element */}
      <div style={{ fontSize: 30, fontWeight: 800, color: debt.color, letterSpacing: '-0.02em', lineHeight: 1 }}>
        <Num>{$fc(debt.balance)}</Num>
      </div>
      <div style={{ fontSize: 11, color: '#6b718e', marginTop: 3, marginBottom: 14 }}>
        current balance
      </div>

      {/* Payment breakdown bar */}
      <div style={{ marginBottom: 14 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', marginBottom: 6 }}>
          <div style={label}>Monthly Payment</div>
          <div style={{ fontSize: 13, fontWeight: 700, color: '#dde1f0' }}><Num>{$f(debt.payment)}</Num>/mo</div>
        </div>

        {minimum !== null ? (
          <>
            {/* Segmented bar */}
            <div style={{ height: 6, borderRadius: 4, background: '#1d1d2e', overflow: 'hidden', display: 'flex', marginBottom: 8 }}>
              <div style={{
                width: `${minPct}%`,
                background: '#2a2d45',
                borderRadius: '4px 0 0 4px',
                transition: 'width 0.4s ease',
              }} />
              <div style={{
                width: `${100 - minPct}%`,
                background: '#404570',
                borderRadius: minPct === 0 ? 4 : '0 4px 4px 0',
                transition: 'width 0.4s ease',
              }} />
            </div>
            {/* Labels */}
            <div style={{ display: 'flex', justifyContent: 'space-between' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
                <div style={{ width: 7, height: 7, borderRadius: '50%', background: '#2a2d45', flexShrink: 0 }} />
                <div>
                  <div style={{ fontSize: 10, color: '#6b718e' }}>Minimum{debt.minEstimated ? ' (est.)' : ''}</div>
                  <div style={{ fontSize: 13, fontWeight: 700, color: '#9095b0' }}><Num>{$f(minimum)}</Num></div>
                </div>
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
                <div style={{ textAlign: 'right' }}>
                  <div style={{ fontSize: 10, color: '#6b718e' }}>Extra toward debt</div>
                  <div style={{ fontSize: 13, fontWeight: 700, color: '#9095b0' }}>+<Num>{$f(extra)}</Num></div>
                </div>
                <div style={{ width: 7, height: 7, borderRadius: '50%', background: '#404570', flexShrink: 0 }} />
              </div>
            </div>
          </>
        ) : (
          <>
            <div style={{ height: 6, borderRadius: 4, background: '#1d1d2e', marginBottom: 8 }} />
            <div style={{
              display: 'flex', alignItems: 'center', gap: 7,
              padding: '6px 9px', borderRadius: 6,
              background: 'rgba(251,191,36,0.08)',
              border: '1px solid rgba(251,191,36,0.25)',
            }}>
              <span style={{ fontSize: 13 }}>⚠</span>
              <div>
                <div style={{ fontSize: 10, fontWeight: 700, color: '#fbbf24', letterSpacing: '0.05em' }}>MINIMUM NEEDED</div>
                <div style={{ fontSize: 10, color: '#92724a', marginTop: 1 }}>Check statement or issuer app</div>
              </div>
            </div>
          </>
        )}
      </div>

      {/* Stats grid */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8, marginBottom: 14 }}>
        <div style={{ background: '#0d0d16', borderRadius: 7, padding: '8px 10px' }}>
          <div style={label}>Interest Cost</div>
          <div style={{ fontSize: 13, fontWeight: 700, color: interest > 1000 ? '#ef4444' : '#dde1f0', marginTop: 3 }}>
            <Num>{$f(interest)}</Num>
          </div>
        </div>
        <div style={{ background: '#0d0d16', borderRadius: 7, padding: '8px 10px' }}>
          <div style={label}>Projected Payoff</div>
          <div style={{ fontSize: 12, fontWeight: 700, color: payoff ? '#00d68f' : '#6b718e', marginTop: 3, whiteSpace: 'nowrap' }}>
            <Num>{payoff ? fmtDate(payoff) : '—'}</Num>
          </div>
        </div>
      </div>

      {/* Countdown — only on focus card */}
      {isFocus && monthsLeft !== null && (
        <div style={{
          marginBottom: 14,
          padding: '10px 12px',
          background: '#0d0d16',
          border: '1px solid var(--border)',
          borderRadius: 8,
          display: 'flex',
          alignItems: 'center',
          gap: 10,
        }}>
          <div style={{ fontSize: 28, fontWeight: 800, color: '#dde1f0', lineHeight: 1, letterSpacing: '-0.02em' }}>
            <Num>{monthsLeft}</Num>
          </div>
          <div>
            <div style={{ fontSize: 12, fontWeight: 700, color: '#9095b0' }}>months to payoff</div>
            <div style={{ fontSize: 10, color: '#6b718e', marginTop: 1 }}>
              Then <Num>{$f(debt.payment)}</Num>/mo cascades to next
            </div>
          </div>
          {/* Progress dots */}
          <div style={{ marginLeft: 'auto', display: 'flex', gap: 3, flexWrap: 'wrap', maxWidth: 60, justifyContent: 'flex-end' }}>
            {Array.from({ length: Math.min(monthsLeft, 12) }).map((_, i) => (
              <div key={i} style={{
                width: 6, height: 6, borderRadius: '50%',
                background: i < 3 ? '#404570' : '#1d1d2e',
              }} />
            ))}
          </div>
        </div>
      )}

      {/* Priority / fixed badge */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
        {debt.longTerm ? (
          <div style={{
            fontSize: 10, fontWeight: 700, padding: '2px 7px', borderRadius: 4,
            background: 'rgba(100,116,139,0.12)', color: '#64748b', letterSpacing: '0.05em',
          }}>
            LONG TERM · MIN ONLY
          </div>
        ) : (
          <div style={{
            fontSize: 10, fontWeight: 700, padding: '2px 7px', borderRadius: 4,
            background: '#0d0d16', color: '#6b718e', letterSpacing: '0.05em',
          }}>
            PRIORITY #{debt.priority}
          </div>
        )}
        {debt.type === 'loan' && (
          <div style={{ fontSize: 10, fontWeight: 600, padding: '2px 7px', borderRadius: 4, background: '#0d0d16', color: '#6b718e' }}>
            LOAN
          </div>
        )}
      </div>

      {/* DANGER warning */}
      {isDanger && (
        <div style={{
          marginTop: 12,
          padding: '9px 11px',
          background: 'rgba(239,68,68,0.08)',
          border: '1px solid rgba(239,68,68,0.22)',
          borderRadius: 7,
        }}>
          <div style={{ fontSize: 10, fontWeight: 800, color: '#ef4444', letterSpacing: '0.08em', marginBottom: 3 }}>
            ⚠ DEFERRED INTEREST DANGER
          </div>
          <div style={{ fontSize: 11, color: '#fca5a5', lineHeight: 1.5 }}>
            If any balance remains after <strong>{debt.deferredDeadline}</strong>, all backdated interest at 28.99% hits at once. On track to pay off {result?.payoffDate ? fmtDate(result.payoffDate) : '—'} — before the deadline.
          </div>
        </div>
      )}

      {/* Promo note */}
      {isPromo && (
        <div style={{
          marginTop: 12, padding: '7px 11px',
          background: 'rgba(99,102,241,0.07)',
          border: '1px solid rgba(99,102,241,0.15)',
          borderRadius: 7,
          fontSize: 11, color: '#818cf8',
        }}>
          0% promo ends {debt.promoEnd} — pay minimums only until then
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════
   STAT CARD
══════════════════════════════════════════════════ */
function StatCard({ lbl, value, sub, color, className }) {
  return (
    <div className={className} style={{ ...card, display: 'flex', flexDirection: 'column', gap: 2 }}>
      <div style={label}>{lbl}</div>
      <div style={{ ...val, color: color || '#dde1f0', fontSize: 22 }}><Num>{value}</Num></div>
      {sub && <div style={{ fontSize: 12, color: '#6b718e' }}>{sub}</div>}
    </div>
  );
}

// FLOW_DATA loaded from DATA.js

/* ══════════════════════════════════════════════════
   MONEY FLOW COMPONENT
══════════════════════════════════════════════════ */
function MoneyFlow({ payoffMap = {} }) {
  const [path, setPath] = useState([FLOW_DATA]);
  const [animKey, setAnimKey] = useState(0);
  const [sortMode, setSortMode] = useState('default');
  const current = path[path.length - 1];

  const drillIn = node => {
    if (node.children && node.children.length) {
      setPath(p => [...p, node]);
      setAnimKey(k => k + 1);
      setSortMode('default');
    }
  };

  const goToIndex = i => {
    setPath(p => p.slice(0, i + 1));
    setAnimKey(k => k + 1);
    setSortMode('default');
  };

  // Sort helpers
  const payoffKey = node => {
    if (!node.payoffRef || !node.payoffRef.length) return Infinity;
    const months = node.payoffRef.map(id => payoffMap[id] ?? Infinity);
    return Math.max(...months);
  };

  const sortedChildren = useMemo(() => {
    const kids = [...(current.children || [])];
    if (sortMode === 'amount')  return kids.sort((a, b) => (b.amount || 0) - (a.amount || 0));
    if (sortMode === 'apr')     return kids.sort((a, b) => (b.apr || 0) - (a.apr || 0));
    if (sortMode === 'dueDay')  return kids.sort((a, b) => (a.dueDay ?? 999) - (b.dueDay ?? 999));
    if (sortMode === 'payoff')  return kids.sort((a, b) => payoffKey(a) - payoffKey(b));
    return kids;
  }, [current, sortMode, payoffMap]);

  // Which sort options are relevant at this level?
  const kids = current.children || [];
  const hasAmount  = kids.some(n => n.amount != null);
  const hasApr     = kids.some(n => n.apr != null);
  const hasDueDay  = kids.some(n => n.dueDay != null);
  const hasPayoff  = kids.some(n => n.payoffRef?.some(id => payoffMap[id] != null));

  const fmtAmt = node => {
    if (node.amountLabel) return node.amountLabel;
    if (node.amount == null) return null;
    return '$' + node.amount.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  };

  const typeLabel = t => ({ income: 'Income', pod: 'Pod', account: 'Account', leaf: 'Budget' }[t] || '');
  const isClickable = node => !!(node.children && node.children.length);

  return (
    <div style={{ marginTop: 56, marginBottom: 56 }}>
      <div style={{ ...label, marginBottom: 20 }}>Paycheck Flow — Interactive</div>

      {/* Breadcrumb */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 4, marginBottom: 20, flexWrap: 'wrap' }}>
        {path.map((node, i) => (
          <React.Fragment key={node.id}>
            {i > 0 && <span style={{ color: 'var(--faint)', fontSize: 14, padding: '0 2px' }}>›</span>}
            <button
              onClick={() => i < path.length - 1 && goToIndex(i)}
              style={{
                background: i === path.length - 1 ? `${node.color}18` : 'transparent',
                border: 'none', padding: '4px 10px', borderRadius: 6,
                cursor: i < path.length - 1 ? 'pointer' : 'default',
                color: i === path.length - 1 ? 'var(--text)' : node.color,
                fontSize: 13, fontWeight: i === path.length - 1 ? 700 : 500,
                fontFamily: 'inherit', transition: 'background 0.15s',
              }}
            >
              {node.emoji} {node.label}
            </button>
          </React.Fragment>
        ))}
      </div>

      {/* Back button */}
      {path.length > 1 && (
        <button
          onClick={() => goToIndex(path.length - 2)}
          style={{
            display: 'inline-flex', alignItems: 'center', gap: 6,
            background: 'var(--card)', border: '1px solid var(--border)',
            borderRadius: 8, padding: '7px 14px', marginBottom: 16,
            color: 'var(--muted)', fontSize: 13, cursor: 'pointer',
            fontFamily: 'inherit', transition: 'border-color 0.2s',
          }}
          onMouseEnter={e => e.currentTarget.style.borderColor = 'var(--border-h)'}
          onMouseLeave={e => e.currentTarget.style.borderColor = 'var(--border)'}
        >
          ← {path[path.length - 2].emoji} {path[path.length - 2].label}
        </button>
      )}

      {/* Context banner */}
      {current.sublabel && (
        <div style={{
          fontSize: 13, color: 'var(--muted)', marginBottom: 16,
          padding: '14px 18px', background: 'var(--card)',
          borderRadius: 10, border: '1px solid var(--border)',
          lineHeight: 1.6,
        }}>
          {current.sublabel}
        </div>
      )}

      {/* Sort controls */}
      {kids.length > 1 && (hasAmount || hasApr || hasDueDay || hasPayoff) && (
        <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 20, flexWrap: 'wrap' }}>
          <span style={{ fontSize: 11, color: 'var(--faint)', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.08em', marginRight: 2 }}>
            Sort
          </span>
          {[
            { key: 'default', label: 'Default',    show: true },
            { key: 'amount',  label: 'Amount ↓',   show: hasAmount },
            { key: 'apr',     label: 'Interest ↓', show: hasApr },
            { key: 'dueDay',  label: 'Due Date ↑', show: hasDueDay },
            { key: 'payoff',  label: 'Pay Off ↑',  show: hasPayoff },
          ].filter(o => o.show).map(opt => (
            <button
              key={opt.key}
              onClick={() => setSortMode(opt.key)}
              style={{
                fontSize: 11, fontWeight: 600,
                padding: '4px 10px', borderRadius: 20,
                border: sortMode === opt.key ? `1px solid ${current.color}` : '1px solid var(--border)',
                background: sortMode === opt.key ? `${current.color}22` : 'var(--card)',
                color: sortMode === opt.key ? current.color : 'var(--muted)',
                cursor: 'pointer', fontFamily: 'inherit',
                transition: 'all 0.15s',
              }}
            >
              {opt.label}
            </button>
          ))}
        </div>
      )}

      {/* Cards */}
      <div key={animKey} className="flow-grid" style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(210px, 1fr))', gap: 16 }}>
        {sortedChildren.map((node, i) => {
          const clickable = isClickable(node);
          const amt = fmtAmt(node);
          return (
            <div
              key={node.id}
              className={`fu d${Math.min(i + 1, 9)}`}
              onClick={() => drillIn(node)}
              style={{
                background: 'var(--card)', border: '1px solid var(--border)',
                borderRadius: 10, padding: '18px 18px',
                position: 'relative',
                cursor: clickable ? 'pointer' : 'default',
                transition: 'border-color 0.2s, background 0.2s, transform 0.15s',
                userSelect: 'none',
              }}
              onMouseEnter={e => {
                if (!clickable) return;
                e.currentTarget.style.background = 'var(--card-h)';
                e.currentTarget.style.borderColor = node.color;
                e.currentTarget.style.transform = 'translateY(-2px)';
              }}
              onMouseLeave={e => {
                e.currentTarget.style.background = 'var(--card)';
                e.currentTarget.style.borderColor = 'var(--border)';
                e.currentTarget.style.transform = 'none';
              }}
            >
              {/* Color dot */}
              <div style={{
                position: 'absolute', top: 10, right: 10,
                width: 8, height: 8, borderRadius: '50%',
                background: node.color,
              }} />

              {/* Type badge + drill arrow */}
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
                <span style={{
                  fontSize: 10, fontWeight: 700, letterSpacing: '0.08em',
                  textTransform: 'uppercase', color: 'var(--muted)',
                  background: '#0d0d16', padding: '2px 7px', borderRadius: 4,
                }}>
                  {typeLabel(node.type)}
                </span>
                {clickable && <span style={{ color: 'var(--muted)', fontSize: 18, lineHeight: 1 }}>›</span>}
              </div>

              {/* Emoji */}
              <div style={{ fontSize: 24, marginBottom: 6, lineHeight: 1 }}>{node.emoji}</div>

              {/* Label */}
              <div style={{ fontSize: 14, fontWeight: 700, color: 'var(--text)', marginBottom: 8, lineHeight: 1.3 }}>
                {node.label}
              </div>

              {/* Current balance */}
              {node.balance != null && (
                <div style={{ marginBottom: 4 }}>
                  <span style={{
                    fontSize: 20, fontWeight: 800, letterSpacing: '-0.02em',
                    color: node.balance > 0 ? node.color : 'var(--faint)',
                  }}>
                    <Num>{$fc(node.balance)}</Num>
                  </span>
                  <span style={{ fontSize: 11, color: 'var(--muted)', marginLeft: 4 }}>in pod</span>
                </div>
              )}

              {/* Per-paycheck allocation */}
              {amt && (
                <div style={{ marginBottom: 4 }}>
                  <span style={{ fontSize: 13, fontWeight: 700, color: 'var(--muted)', letterSpacing: '-0.01em' }}>
                    <Num>{amt}</Num>
                  </span>
                  {node.amount != null && (
                    <span style={{ fontSize: 11, color: 'var(--faint)', marginLeft: 4 }}>/paycheck</span>
                  )}
                </div>
              )}

              {/* Goal tracker */}
              {node.goal != null && (
                <div style={{ marginTop: 8, padding: '8px 10px', background: '#0d0d16', borderRadius: 7 }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
                    <span style={{ fontSize: 10, color: 'var(--muted)', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.07em' }}>Goal</span>
                    <span style={{ fontSize: 10, color: 'var(--muted)' }}>{node.goalDate}</span>
                  </div>
                  <div style={{ height: 4, borderRadius: 2, background: 'var(--border)', overflow: 'hidden', marginBottom: 6 }}>
                    <div style={{
                      height: '100%', borderRadius: 2,
                      width: `${Math.min(((node.balance || 0) / node.goal) * 100, 100)}%`,
                      background: node.color,
                      transition: 'width 0.4s ease',
                    }} />
                  </div>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
                    <span style={{ fontSize: 12, fontWeight: 700, color: 'var(--text)' }}>
                      <Num>{$fc(node.balance || 0)}</Num> <span style={{ color: 'var(--faint)', fontWeight: 400 }}>/ <Num>{$fc(node.goal)}</Num></span>
                    </span>
                    {node.goalPerPaycheck && (
                      <span style={{ fontSize: 11, color: node.color, fontWeight: 700 }}>+<Num>{$fc(node.goalPerPaycheck)}</Num>/paycheck</span>
                    )}
                  </div>
                </div>
              )}

              {/* Note */}
              {node.note && (
                <div style={{ fontSize: 11, color: 'var(--muted)', lineHeight: 1.4, marginTop: 6 }}>
                  {node.note}
                </div>
              )}

              {/* Drill CTA */}
              {clickable && (
                <div style={{ marginTop: 10, fontSize: 11, color: 'var(--muted)', fontWeight: 600 }}>
                  Tap to see breakdown →
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function nextDueDate(dueDay) {
  if (!dueDay) return null;
  const now = new Date();
  const d   = new Date(now.getFullYear(), now.getMonth(), dueDay);
  return d <= now ? new Date(now.getFullYear(), now.getMonth() + 1, dueDay) : d;
}
function fmtDue(dueDay) {
  const d = nextDueDate(dueDay);
  if (!d) return '—';
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function RoadRow({ debt, result, isFocus, isLast }) {

          background: isFocus ? debt.color : '#0d0d16',

          color: isFocus ? '#fff' : debt.color,
          boxShadow: isFocus ? `0 0 0 5px ${debt.color}20` : 'none',

            </div>
            {isFocus && (
              <span style={{

                fontSize: 9, fontWeight: 800, letterSpacing: '0.1em', textTransform: 'uppercase',
                padding: '2px 7px', borderRadius: 3,

}

function RoadmapPage({ plan, debts }) {
  const consumer = debts.filter(d => !d.longTerm).sort((a, b) => a.priority - b.priority);
  const longTerm  = debts.filter(d => d.longTerm).sort((a, b) => a.priority - b.priority);

  const focusId = consumer.find(d => {
    const r = plan.results.find(r => r.id === d.id);
    return d.balance > 0 && !r?.done;
  })?.id;

  const totalBalance = debts.reduce((s, d) => s + d.balance, 0);

  return (
    <div style={{ background: 'var(--bg)', minHeight: '100vh' }}>
      <div style={{ maxWidth: 640, margin: '0 auto', padding: '36px 16px 80px' }}>

        {/* Page header */}
        <div style={{ marginBottom: 40 }}>
          <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.14em', textTransform: 'uppercase', color: 'var(--accent)', marginBottom: 6 }}>
            The Plan
          </div>
          <h2 style={{ fontSize: 28, fontWeight: 800, color: 'var(--text)', letterSpacing: '-0.03em', lineHeight: 1, margin: 0 }}>
            Payoff Roadmap
          </h2>
          <div style={{ display: 'flex', gap: 16, marginTop: 10, flexWrap: 'wrap' }}>
            <span style={{ fontSize: 13, color: 'var(--muted)' }}>
              {consumer.length + longTerm.length} accounts
            </span>
            <span style={{ fontSize: 13, color: 'var(--muted)' }}>
              <Num>{$f(totalBalance)}</Num> total
            </span>
            <span style={{ fontSize: 13, color: 'var(--muted)' }}>
              Avalanche — highest APR first
            </span>
          </div>
        </div>

        {/* ── Consumer debts ── */}
        <div style={{
          fontSize: 10, fontWeight: 700, letterSpacing: '0.12em', textTransform: 'uppercase',
          color: 'var(--faint)', marginBottom: 20, paddingLeft: 46,
        }}>
          Consumer · {consumer.length} accounts
        </div>

        {consumer.map((d, i) => (
          <RoadRow
            key={d.id}
            debt={d}
            result={plan.results.find(r => r.id === d.id)}
            isFocus={d.id === focusId}
            isLast={i === consumer.length - 1}
          />
        ))}

        {/* ── Cascade divider ── */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, margin: '32px 0' }}>
          <div style={{ flex: 1, height: 1, background: 'var(--border)' }} />
          <div style={{
            fontSize: 10, fontWeight: 700, letterSpacing: '0.07em', textTransform: 'uppercase',
            color: 'var(--faint)', whiteSpace: 'nowrap',
          }}>
            Consumer debts cleared · Cascade continues ↓
          </div>
          <div style={{ flex: 1, height: 1, background: 'var(--border)' }} />
        </div>

        {/* ── Long-term loans ── */}
        <div style={{
          fontSize: 10, fontWeight: 700, letterSpacing: '0.12em', textTransform: 'uppercase',
          color: 'var(--faint)', marginBottom: 20, paddingLeft: 46,
        }}>
          Long-Term · {longTerm.length} accounts
        </div>

        {longTerm.map((d, i) => (
          <RoadRow
            key={d.id}
            debt={d}
            result={plan.results.find(r => r.id === d.id)}
            isFocus={false}
            isLast={i === longTerm.length - 1}
          />
        ))}

      </div>
    </div>
  );
}

// CORRECT_PIN is loaded from DATA.js

function LockScreen({ onUnlock }) {
  const [pin, setPin] = useState('');
  const [shake, setShake] = useState(false);
  const [hint, setHint] = useState('');
  const [bioAvail, setBioAvail] = useState(false);
  const [bioTrying, setBioTrying] = useState(false);

  useEffect(() => {
    (async () => {
      if (typeof PublicKeyCredential === 'undefined') return;
      try {
        const ok = await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
        if (!ok) return;
        setBioAvail(true);
        // Auto-trigger biometric if credential already set up
        if (localStorage.getItem('_bio_cid')) attemptBio();
      } catch(e) {}
    })();
  }, []);

  async function attemptBio() {
    if (bioTrying) return;
    setBioTrying(true);
    setHint('');
    try {
      const credId = localStorage.getItem('_bio_cid');
      const hostname = window.location.hostname || 'localhost';
      const challenge = crypto.getRandomValues(new Uint8Array(32));
      if (!credId) {
        // First time — register a passkey
        const cred = await navigator.credentials.create({
          publicKey: {
            challenge,
            rp: { name: 'Debt Payoff', id: hostname },
            user: { id: new Uint8Array([1]), name: 'steve', displayName: 'Steve Gordon' },
            pubKeyCredParams: [{ type: 'public-key', alg: -7 }, { type: 'public-key', alg: -257 }],
            authenticatorSelection: { authenticatorAttachment: 'platform', userVerification: 'required' },
            timeout: 60000,
          }
        });
        localStorage.setItem('_bio_cid', btoa(String.fromCharCode(...new Uint8Array(cred.rawId))));
      } else {
        await navigator.credentials.get({
          publicKey: {
            challenge,
            rpId: hostname,
            allowCredentials: [{ type: 'public-key', id: Uint8Array.from(atob(credId), c => c.charCodeAt(0)) }],
            userVerification: 'required',
            timeout: 60000,
          }
        });
      }
      sessionStorage.setItem('_auth', '1');
      onUnlock();
    } catch(e) {
      setBioTrying(false);
      setHint('Biometric cancelled — use PIN');
    }
  }

  function addDigit(d) {
    if (pin.length >= 4) return;
    const next = pin + d;
    setPin(next);
    if (next.length === 4) {
      // Show the 4th dot briefly, then check immediately
      requestAnimationFrame(() => {
        if (next === CORRECT_PIN) {
          sessionStorage.setItem('_auth', '1');
          onUnlock();
        } else {
          setShake(true);
          setHint('Wrong PIN — try again');
          setTimeout(() => { setShake(false); setPin(''); setHint(''); }, 700);
        }
      });
    }
  }

  const dots = [0,1,2,3].map(i => i < pin.length);
  const rows = [['1','2','3'],['4','5','6'],['7','8','9'],['','0','⌫']];

  return (
    <div style={{
      position: 'fixed', inset: 0, background: 'var(--bg)',
      display: 'flex', flexDirection: 'column',
      alignItems: 'center', justifyContent: 'center',
      padding: '32px 24px', zIndex: 9999,
    }}>
      {/* Logo */}
      <div style={{ textAlign: 'center', marginBottom: 44 }}>
        <div style={{ fontSize: 52, marginBottom: 12, lineHeight: 1 }}>💸</div>
        <div style={{ fontSize: 22, fontWeight: 800, color: 'var(--text)', letterSpacing: '-0.03em' }}>Debt Payoff</div>
        <div style={{ fontSize: 13, color: 'var(--muted)', marginTop: 4 }}>Steve Gordon</div>
      </div>

      {/* Biometric button */}
      {bioAvail && (
        <button
          onClick={attemptBio}
          disabled={bioTrying}
          style={{
            background: '#0d0d1a', border: '1px solid var(--border)',
            borderRadius: 14, padding: '13px 28px',
            color: bioTrying ? 'var(--muted)' : 'var(--text)',
            fontSize: 14, fontWeight: 600, cursor: 'pointer',
            fontFamily: 'inherit', marginBottom: 36,
            display: 'flex', alignItems: 'center', gap: 8,
            WebkitTapHighlightColor: 'transparent',
          }}
        >
          <span style={{ fontSize: 20 }}>{bioTrying ? '⏳' : localStorage.getItem('_bio_cid') ? '🔓' : '🔒'}</span>
          {bioTrying ? 'Authenticating…' : localStorage.getItem('_bio_cid') ? 'Use Face ID / Touch ID' : 'Set Up Face ID / Touch ID'}
        </button>
      )}

      {/* PIN dots */}
      <div style={{
        display: 'flex', gap: 18, marginBottom: 10,
        animation: shake ? 'shake 0.55s ease' : 'none',
      }}>
        {dots.map((on, i) => (
          <div key={i} style={{
            width: 14, height: 14, borderRadius: '50%',
            background: on ? '#6366f1' : 'transparent',
            border: `2px solid ${on ? '#6366f1' : 'var(--faint)'}`,
            transition: 'all 0.1s',
          }} />
        ))}
      </div>

      {/* Hint text */}
      <div style={{
        fontSize: 12, minHeight: 20, marginBottom: 28, textAlign: 'center',
        color: hint.startsWith('Wrong') ? '#ef4444' : 'var(--muted)',
        transition: 'color 0.2s',
      }}>
        {hint || (bioAvail && !localStorage.getItem('_bio_cid') ? 'Set up Face ID or enter PIN' : 'Enter PIN')}
      </div>

      {/* Keypad */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 76px)', gap: 12 }}>
        {rows.flat().map((k, i) => (
          <button
            key={i}
            onClick={() => k === '⌫' ? setPin(p => p.slice(0,-1)) : k ? addDigit(k) : null}
            style={{
              height: 76, borderRadius: '50%',
              background: k ? '#13131f' : 'transparent',
              border: k ? '1px solid var(--border)' : 'none',
              color: k === '⌫' ? 'var(--muted)' : 'var(--text)',
              fontSize: k === '⌫' ? 20 : 24, fontWeight: 400,
              cursor: k ? 'pointer' : 'default',
              fontFamily: 'inherit',
              WebkitTapHighlightColor: 'transparent',
              touchAction: 'manipulation',
              transition: 'background 0.1s',
              userSelect: 'none',
            }}
            onTouchStart={e => { if(k) e.currentTarget.style.background = '#1e1e35'; }}
            onTouchEnd={e => { e.currentTarget.style.background = k ? '#13131f' : 'transparent'; }}
          >
            {k}
          </button>
        ))}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════
   APP
══════════════════════════════════════════════════ */
function App() {
  const [debts, setDebts]       = useState(DEBTS);
  const [extra, setExtra]       = useState(0);
  const [apiStatus, setStatus]  = useState('loading');
  const [visibleIds, setVisibleIds]   = useState(() => new Set(DEBTS.filter(d => !d.longTerm).map(d => d.id)));
  const [useToday, setUseToday]       = useState(false);
  const [showLongTerm, setShowLongTerm] = useState(false);
  const [blurred, setBlurred]   = useState(false);
  const [page, setPage]         = useState('dashboard');
  const simStartDate = useToday ? new Date() : START_DATE;

  useEffect(() => {
    trySequenceAPI().then(data => {
      if (data) { setDebts(data); setStatus('live'); }
      else setStatus('static');
    });
  }, []);

  const longTermLoans = useMemo(() => debts.filter(d => d.longTerm),  [debts]);
  const consumerDebts = useMemo(() => debts.filter(d => !d.longTerm), [debts]);

  // Consumer chip toggles affect simulation; long-term loans always included
  const activeDebts = useMemo(() => [
    ...consumerDebts.filter(d => visibleIds.has(d.id)),
    ...longTermLoans,
  ], [consumerDebts, longTermLoans, visibleIds]);

  // Only redirect payments from hidden consumer debts (long-term toggle is visual only)
  const redirected = useMemo(() =>
    consumerDebts.filter(d => !visibleIds.has(d.id)).reduce((s, d) => s + d.payment, 0),
    [consumerDebts, visibleIds]);

  const base = useMemo(() => simulate(activeDebts, redirected,         simStartDate), [activeDebts, redirected, simStartDate]);
  const plan = useMemo(() => simulate(activeDebts, extra + redirected, simStartDate), [activeDebts, extra, redirected, simStartDate]);
  const payoffMap = useMemo(() => Object.fromEntries(plan.results.map(r => [r.id, r.payoffMonth ?? Infinity])), [plan]);

  const savings   = Math.max(0, base.totalInterest - plan.totalInterest);
  const totalDebt = debts.reduce((s, d) => s + d.balance, 0);
  const totalPmt  = debts.reduce((s, d) => s + d.payment, 0);

  const wfR       = plan.results.find(d => d.id === 'wellsfargo');
  const upstartR  = plan.results.find(d => d.id === 'upstart');
  const lastPayoff = plan.results
    .filter(d => d.payoffDate)
    .sort((a, b) => b.payoffMonth - a.payoffMonth)[0];

  // Build milestone annotations — consumer debts always, long-term only when showLongTerm
  const milestones = [
    ...plan.results
      .filter(d => {
        if (!d.payoffDate) return false;
        const debt = debts.find(x => x.id === d.id);
        return debt?.longTerm ? showLongTerm : visibleIds.has(d.id);
      })
      .sort((a, b) => a.payoffMonth - b.payoffMonth)
      .map(d => {
        const debt = debts.find(x => x.id === d.id);
        return { month: d.payoffMonth, label: `${debt?.short ?? d.id} paid`, date: fmtDate(d.payoffDate), color: debt?.color ?? '#fff' };
      }),
    visibleIds.has('fidelity') && { month: (2027 - simStartDate.getFullYear()) * 12 + (8 - simStartDate.getMonth()), label: 'Fidelity 0% Ends', date: 'Sep 2027', color: '#6366f1' },
  ].filter(Boolean);

  // Chart ends at last visible payoff — consumer-only when Long Term is hidden
  const consumerLastPayoff = plan.results
    .filter(d => d.payoffDate && !debts.find(x => x.id === d.id)?.longTerm && visibleIds.has(d.id))
    .sort((a, b) => b.payoffMonth - a.payoffMonth)[0];
  const chartEnd  = showLongTerm
    ? (lastPayoff?.payoffMonth ?? 36) + 1
    : (consumerLastPayoff?.payoffMonth ?? lastPayoff?.payoffMonth ?? 36) + 3;
  const chartData = plan.rows.filter(r => r.m <= chartEnd);

  // Extra-payment diff for Upstart payoff
  const baseUpstart = base.results.find(d => d.id === 'upstart');
  const planUpstart = plan.results.find(d => d.id === 'upstart');

  // What's Next — upcoming payoffs sorted by date
  const upcomingPayoffs = plan.results
    .filter(r => r.payoffDate && visibleIds.has(r.id))
    .sort((a, b) => a.payoffMonth - b.payoffMonth);
  const wnNextR  = upcomingPayoffs[0];
  const wnNextD  = wnNextR ? debts.find(d => d.id === wnNextR.id) : null;
  const wnAfterR = upcomingPayoffs[1];
  const wnAfterD = wnAfterR ? debts.find(d => d.id === wnAfterR.id) : null;
  const wnDeadlineMonths = (new Date(2027, 0, 24) - simStartDate) / (1000 * 60 * 60 * 24 * 30.44);
  const wnWfOnTrack = wfR?.payoffMonth && wfR.payoffMonth < wnDeadlineMonths;

  return (
    <BlurCtx.Provider value={blurred}>
    <NavBar page={page} setPage={setPage} blurred={blurred} setBlurred={setBlurred} />
    {page === 'roadmap' ? (
      <RoadmapPage plan={plan} debts={debts} />
    ) : (
    <div style={{ background: 'var(--bg)', minHeight: '100vh', paddingBottom: 60 }}>
      <div style={{ maxWidth: 1280, margin: '0 auto', padding: '28px 16px' }}>

        {/* ── HEADER ── */}
        <div className="fu" style={{ marginBottom: 28, display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', flexWrap: 'wrap', gap: 12 }}>
          <div>
            <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.14em', textTransform: 'uppercase', color: 'var(--accent)', marginBottom: 5 }}>
              Debt Payoff Dashboard
            </div>
            <h1 style={{ fontSize: 28, fontWeight: 800, color: 'var(--text)', letterSpacing: '-0.025em', lineHeight: 1 }}>
              Steve Gordon
            </h1>
            <div style={{ fontSize: 13, color: 'var(--muted)', marginTop: 5 }}>
              Avalanche method · Van life budget · {new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}
            </div>
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 8 }}>
            {/* Start date toggle */}
            <div style={{
              display: 'inline-flex', borderRadius: 8, overflow: 'hidden',
              border: '1px solid #1d1d2e', background: '#0d0d16',
            }}>
              {[
                { label: 'From Start', val: false, sub: 'Apr 11, 2026' },
                { label: 'From Today', val: true,  sub: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) },
              ].map(opt => (
                <button
                  key={opt.label}
                  onClick={() => setUseToday(opt.val)}
                  style={{
                    padding: '6px 14px', border: 'none', cursor: 'pointer',
                    background: useToday === opt.val ? '#1d1d2e' : 'transparent',
                    color: useToday === opt.val ? '#dde1f0' : '#6b718e',
                    fontSize: 11, fontWeight: 700, letterSpacing: '0.04em',
                    transition: 'all 0.15s ease',
                    display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 1,
                  }}
                >
                  {opt.label}
                  <span style={{ fontSize: 9, fontWeight: 400, opacity: 0.7 }}>{opt.sub}</span>
                </button>
              ))}
            </div>
            {/* API status pill */}
            <div style={{
              display: 'inline-flex', alignItems: 'center', gap: 6,
              padding: '5px 11px', borderRadius: 20, fontSize: 12, fontWeight: 600,
              background: apiStatus === 'live' ? 'rgba(0,214,143,0.1)' : 'rgba(107,113,142,0.1)',
              border: `1px solid ${apiStatus === 'live' ? 'rgba(0,214,143,0.2)' : 'rgba(107,113,142,0.2)'}`,
              color: apiStatus === 'live' ? '#00d68f' : 'var(--muted)',
            }}>
              <span style={{ width: 6, height: 6, borderRadius: '50%', background: 'currentColor', display: 'inline-block' }} />
              {apiStatus === 'loading' ? 'Connecting to Sequence…' : apiStatus === 'live' ? 'Live · Sequence.io' : 'Static snapshot'}
            </div>
          </div>
        </div>

        {/* ── TOP STATS ── */}
        <div className="fu d1 stats-grid" style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(190px, 1fr))', gap: 12, marginBottom: 20 }}>
          <StatCard lbl="Total Debt" value={$f(totalDebt)} sub={`${debts.length} accounts`} />
          <StatCard lbl="Monthly Payments" value={$f(totalPmt)} sub="all accounts" />
          <StatCard lbl="Total Interest" value={$f(base.totalInterest)} sub="all accounts, current plan" color="#ef4444" />
          <StatCard lbl="Final Payoff" value={lastPayoff ? fmtDate(lastPayoff.payoffDate) : '—'} sub={lastPayoff?.name ?? ''} color="#00d68f" />
        </div>

        {/* ── TIMELINE CHART ── */}
        <div className="fu d2" style={{ ...card, marginBottom: 20, padding: '20px 4px 16px 4px' }}>
          <div style={{ padding: '0 20px 14px', display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', flexWrap: 'wrap', gap: 10 }}>
            <div>
              <div style={label}>Payoff Timeline</div>
              <div style={{ fontSize: 15, fontWeight: 700, color: 'var(--text)', marginTop: 3 }}>
                Balance by Account — Avalanche Method
              </div>
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 4 }}>
              <div style={{ display: 'inline-flex', borderRadius: 8, overflow: 'hidden', border: '1px solid #1d1d2e', background: '#0d0d16' }}>
                {[
                  { label: 'Consumer Debt', val: false },
                  { label: 'Long Term',     val: true  },
                ].map(opt => (
                  <button
                    key={opt.label}
                    onClick={() => setShowLongTerm(opt.val)}
                    style={{
                      padding: '5px 12px', border: 'none', cursor: 'pointer',
                      background: showLongTerm === opt.val ? '#1d1d2e' : 'transparent',
                      color: showLongTerm === opt.val ? '#dde1f0' : '#6b718e',
                      fontSize: 11, fontWeight: 700, letterSpacing: '0.04em',
                      transition: 'all 0.15s ease',
                    }}
                  >
                    {opt.label}
                  </button>
                ))}
              </div>
              <div style={{ fontSize: 9, color: '#3a3f5e', textAlign: 'right', letterSpacing: '0.03em' }}>
                {showLongTerm
                  ? 'Van & student loans shown — visual only, always in calculations'
                  : 'Van & student loans hidden — still included in all calculations'}
              </div>
            </div>
          </div>

          <ResponsiveContainer width="100%" height={340}>
            <AreaChart data={chartData} margin={{ top: 8, right: 20, left: 0, bottom: 0 }}>
              <defs>
                {DEBTS.map(d => (
                  <linearGradient key={d.id} id={`g_${d.id}`} x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%"   stopColor={d.color} stopOpacity={0.55} />
                    <stop offset="100%" stopColor={d.color} stopOpacity={0.04} />
                  </linearGradient>
                ))}
              </defs>

              <CartesianGrid strokeDasharray="3 3" stroke="#1d1d2e" vertical={false} />
              <XAxis
                dataKey="label"
                tick={{ fill: '#6b718e', fontSize: 10 }}
                axisLine={false} tickLine={false}
                interval={2}
              />
              <YAxis
                tickFormatter={v => blurred ? '••••' : `$${(v / 1000).toFixed(0)}k`}
                tick={{ fill: '#6b718e', fontSize: 10 }}
                axisLine={false} tickLine={false}
                width={40}
              />
              <Tooltip content={<ChartTooltip />} />

              {/* Milestone vertical lines */}
              {milestones.map(m => {
                const row = chartData[m.month];
                return row ? (
                  <ReferenceLine
                    key={m.label}
                    x={row.label}
                    stroke={m.color}
                    strokeDasharray="4 3"
                    strokeWidth={1.5}
                    label={({ viewBox }) => (
                      <g>
                        <text x={viewBox.x + 4} y={viewBox.y + 12} fill={m.color} fontSize={9} fontWeight={700}>{m.label}</text>
                        <text x={viewBox.x + 4} y={viewBox.y + 23} fill={m.color} fontSize={8} opacity={0.65}>{m.date}</text>
                      </g>
                    )}
                  />
                ) : null;
              })}

              {/* Stacked areas — consumer debts */}
              {[...consumerDebts].reverse().filter(d => visibleIds.has(d.id)).map(d => (
                <Area
                  key={d.id}
                  type="monotone"
                  dataKey={d.id}
                  name={d.short}
                  stackId="1"
                  stroke={d.color}
                  strokeWidth={1.5}
                  fill={`url(#g_${d.id})`}
                  fillOpacity={1}
                  isAnimationActive={true}
                  animationDuration={900}
                />
              ))}

              {/* Long-term loans — shown only when long-term view is on */}
              {showLongTerm && longTermLoans.map(d => (
                <Area
                  key={d.id}
                  type="monotone"
                  dataKey={d.id}
                  name={d.short}
                  stroke={d.color}
                  strokeWidth={2.5}
                  fill="none"
                  dot={false}
                  isAnimationActive={true}
                  animationDuration={900}
                />
              ))}
            </AreaChart>
          </ResponsiveContainer>

          {/* Toggle chips — consumer debts only; long-term loans controlled by Long Term toggle */}
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, padding: '14px 20px 4px', justifyContent: 'center' }}>
            {consumerDebts.map(d => {
              const on = visibleIds.has(d.id);
              return (
                <button
                  key={d.id}
                  onClick={() => setVisibleIds(prev => {
                    const next = new Set(prev);
                    if (next.has(d.id)) next.delete(d.id); else next.add(d.id);
                    return next;
                  })}
                  style={{
                    display: 'flex', alignItems: 'center', gap: 5,
                    padding: '4px 10px', borderRadius: 20,
                    border: `1px solid ${on ? d.color + '99' : '#1d1d2e'}`,
                    background: on ? d.color + '18' : '#0d0d16',
                    color: on ? d.color : '#3a3f5e',
                    fontSize: 11, fontWeight: 600, cursor: 'pointer',
                    transition: 'all 0.15s ease',
                  }}
                >
                  <span style={{ width: 8, height: 8, borderRadius: 2, background: on ? d.color : '#3a3f5e', display: 'inline-block' }} />
                  {d.short}
                </button>
              );
            })}
          </div>
        </div>

        {/* ── WHAT-IF SLIDER ── */}
        <div className="fu d3" style={{ ...card, marginBottom: 20 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', flexWrap: 'wrap', gap: 8, marginBottom: 16 }}>
            <div>
              <div style={label}>What If I Pay More?</div>
              <div style={{ fontSize: 15, fontWeight: 700, color: 'var(--text)', marginTop: 3 }}>
                Extra monthly payment toward highest-priority debt
              </div>
            </div>
            <div style={{ fontSize: 32, fontWeight: 800, color: 'var(--accent)', letterSpacing: '-0.02em' }}>
              +<Num>{$f(extra)}</Num><span style={{ fontSize: 14, fontWeight: 500, color: 'var(--muted)' }}>/mo</span>
            </div>
          </div>

          <input
            type="range"
            min={0} max={5000} step={25}
            value={extra}
            onChange={e => setExtra(Number(e.target.value))}
            style={{ marginBottom: 6 }}
          />
          <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 10, color: 'var(--muted)' }}>
            {['$0','$1k','$2k','$3k','$4k','$5k'].map(v => <span key={v}>{v}</span>)}
          </div>

          {/* Results row */}
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(180px, 1fr))', gap: 10, marginTop: 18 }}>
            {[
              {
                icon: '↓',
                lbl: 'Interest Saved',
                val: savings > 0 ? $f(savings) : '—',
                sub: 'vs. current plan',
                color: savings > 0 ? '#00d68f' : 'var(--muted)',
              },
              {
                icon: '⚡',
                lbl: 'Upstart Payoff',
                val: planUpstart?.payoffDate ? fmtDate(planUpstart.payoffDate) : '—',
                sub: extra > 0 && baseUpstart?.payoffDate && planUpstart?.payoffDate
                  ? `${Math.max(0, baseUpstart.payoffMonth - planUpstart.payoffMonth)} mo earlier`
                  : 'no change',
                color: '#ef4444',
              },
              {
                icon: '🏁',
                lbl: 'All Debt Free',
                val: lastPayoff?.payoffDate ? fmtDate(lastPayoff.payoffDate) : '—',
                sub: lastPayoff?.name,
                color: 'var(--accent)',
              },
              {
                icon: '$',
                lbl: 'Total Interest',
                val: $f(plan.totalInterest),
                sub: extra > 0 ? `was ${$f(base.totalInterest)}` : 'at current plan',
                color: extra > 0 && plan.totalInterest < base.totalInterest ? '#00d68f' : '#ef4444',
              },
            ].map(s => (
              <div key={s.lbl} style={{
                background: '#0d0d16',
                border: '1px solid var(--border)',
                borderRadius: 8, padding: '11px 13px',
                display: 'flex', gap: 11, alignItems: 'center',
              }}>
                <div style={{ fontSize: 20, minWidth: 24, textAlign: 'center' }}>{s.icon}</div>
                <div>
                  <div style={label}>{s.lbl}</div>
                  <div style={{ fontSize: 15, fontWeight: 700, color: s.color, marginTop: 2 }}><Num>{s.val}</Num></div>
                  <div style={{ fontSize: 10, color: 'var(--muted)', marginTop: 1 }}>{s.sub}</div>
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* ── WHAT'S NEXT ── */}
        <div className="fu d4" style={{ ...card, marginBottom: 28 }}>
          <div style={{ ...label, marginBottom: 16 }}>What's Next</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>

            {/* Primary milestone */}
            {wnNextD && wnNextR && (
              <div style={{
                background: '#0d0d16',
                border: '1px solid var(--border)',
                borderRadius: 8, padding: '16px 18px',
                position: 'relative', overflow: 'hidden',
              }}>
                {/* Colored dot indicator */}
                <div style={{ position: 'absolute', top: 12, right: 12, width: 8, height: 8, borderRadius: '50%', background: wnNextD.color }} />
                <div style={{ fontSize: 10, color: 'var(--muted)', fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 10 }}>
                  Next Payoff
                </div>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 12 }}>
                  <div>
                    <div style={{ fontSize: 19, fontWeight: 800, color: wnNextD.color, letterSpacing: '-0.02em' }}>
                      {wnNextD.name}
                    </div>
                    <div style={{ fontSize: 12, color: 'var(--muted)', marginTop: 3 }}>
                      <Num>{$f(wnNextD.balance)}</Num> remaining &middot; <Num>{$f(wnNextD.payment)}</Num>/mo going in
                    </div>
                  </div>
                  <div style={{ textAlign: 'right', flexShrink: 0 }}>
                    <div style={{ fontSize: 19, fontWeight: 800, color: '#00d68f', letterSpacing: '-0.01em' }}>
                      <Num>{fmtDate(wnNextR.payoffDate)}</Num>
                    </div>
                    <div style={{ fontSize: 12, color: 'var(--muted)', marginTop: 3 }}>
                      <Num>{wnNextR.payoffMonth}</Num> months away
                    </div>
                  </div>
                </div>
                {wnAfterD && wnAfterR && (
                  <div style={{ marginTop: 12, paddingTop: 12, borderTop: '1px solid var(--border)', fontSize: 12, color: 'var(--muted)' }}>
                    Then <span style={{ color: 'var(--text)', fontWeight: 700 }}><Num>{$f(wnNextD.payment)}</Num>/mo</span> cascades to <span style={{ color: 'var(--text)', fontWeight: 700 }}>{wnAfterD.name}</span> &mdash; paid off <span style={{ color: 'var(--text)', fontWeight: 600 }}><Num>{fmtDate(wnAfterR.payoffDate)}</Num></span>
                  </div>
                )}
              </div>
            )}

            {/* Upcoming milestones row */}
            {upcomingPayoffs.length > 1 && (
              <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                {upcomingPayoffs.slice(1, 4).map(m => {
                  const d = debts.find(x => x.id === m.id);
                  if (!d) return null;
                  return (
                    <div key={m.id} style={{
                      background: '#0d0d16', border: '1px solid var(--border)',
                      borderRadius: 8, padding: '10px 14px', flex: '1 1 110px',
                    }}>
                      <div style={{ fontSize: 10, color: 'var(--muted)', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: 5 }}>{d.short}</div>
                      <div style={{ fontSize: 14, fontWeight: 800, color: 'var(--text)' }}><Num>{fmtDate(m.payoffDate)}</Num></div>
                      <div style={{ fontSize: 11, color: 'var(--muted)', marginTop: 2 }}><Num>{m.payoffMonth}</Num> mo away</div>
                    </div>
                  );
                })}
              </div>
            )}

            {/* Wells Fargo deadline alert */}
            {visibleIds.has('wellsfargo') && wfR && wfR.payoffDate && (
              <div style={{
                background: '#0d0d16',
                border: `1px solid ${wnWfOnTrack ? 'rgba(251,191,36,0.25)' : 'rgba(239,68,68,0.45)'}`,
                borderRadius: 8, padding: '12px 16px',
                display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 12,
              }}>
                <div>
                  <div style={{ fontSize: 10, fontWeight: 700, color: wnWfOnTrack ? '#fbbf24' : '#ef4444', letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 4 }}>
                    Wells Fargo Deferred Interest Deadline
                  </div>
                  <div style={{ fontSize: 12, color: 'var(--muted)' }}>
                    Must clear before <span style={{ color: wnWfOnTrack ? '#fbbf24' : '#ef4444', fontWeight: 600 }}>Jan 24, 2027</span> or all deferred interest hits at once
                  </div>
                </div>
                <div style={{ textAlign: 'right', flexShrink: 0 }}>
                  <div style={{ fontSize: 14, fontWeight: 800, color: wnWfOnTrack ? '#00d68f' : '#ef4444' }}>
                    {wnWfOnTrack ? 'On Track' : 'At Risk'}
                  </div>
                  <div style={{ fontSize: 11, color: 'var(--muted)', marginTop: 2 }}>Projected: <Num>{fmtDate(wfR.payoffDate)}</Num></div>
                </div>
              </div>
            )}

          </div>
        </div>

        {/* ── MONEY FLOW ── */}
        <MoneyFlow payoffMap={payoffMap} />

        {/* ── DEBT CARDS (Avalanche) ── */}
        <div style={{ ...label, marginBottom: 14 }}>Debt Accounts — Priority Order (Avalanche)</div>
        <div className="debt-grid" style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(285px, 1fr))', gap: 12 }}>
          {debts.filter(d => !d.longTerm).map((d, i) => {
            const focusId = plan.results
              .filter(r => !r.done && !r.longTerm)
              .sort((a, b) => a.priority - b.priority)[0]?.id;
            return (
              <DebtCard
                key={d.id}
                debt={d}
                result={plan.results.find(r => r.id === d.id)}
                index={Math.min(i, 8)}
                isFocus={d.id === focusId}
              />
            );
          })}
        </div>

        {/* ── FIXED OBLIGATIONS ── */}
        <div style={{ ...label, marginTop: 32, marginBottom: 14 }}>Long-Term Loans — Minimum Only</div>
        <div className="debt-grid" style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(285px, 1fr))', gap: 12 }}>
          {debts.filter(d => d.longTerm).map((d, i) => (
            <DebtCard
              key={d.id}
              debt={d}
              result={plan.results.find(r => r.id === d.id)}
              index={Math.min(i, 8)}
              isFocus={false}
            />
          ))}
        </div>

        {/* ── FOOTER ── */}
        <div style={{
          marginTop: 40, paddingTop: 18,
          borderTop: '1px solid var(--border)',
          display: 'flex', justifyContent: 'space-between', flexWrap: 'wrap', gap: 8,
          fontSize: 11, color: 'var(--faint)',
        }}>
          <span>
            Projections assume fixed monthly payments, no new charges, and no rate changes.
            Balances marked "estimated" need confirmation.
            Wells Fargo deferred interest deadline: Jan 24, 2027.
          </span>
          <span>React + Recharts · Sequence.io budget integration</span>
        </div>

      </div>
    </div>
    )}
    </BlurCtx.Provider>
  );
}

function AppWrapper() {
  const [authed, setAuthed] = useState(() => sessionStorage.getItem('_auth') === '1');
  if (!authed) return <LockScreen onUnlock={() => setAuthed(true)} />;
  return <App />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<AppWrapper />);
</script>
</body>
</html>
